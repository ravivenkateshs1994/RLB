<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
  </head>
  <body style="font-family: Arial, Helvetica, sans-serif; background:#f3f4f6; padding:24px;">
    <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
      <tr>
        <td align="center">
          <table width="600" cellpadding="0" cellspacing="0" role="presentation" style="background:#fff;border:1px solid #e6e9ef;border-radius:8px;padding:20px;color:#222;">
            <tr>
              <td style="padding-bottom:12px;">
                <p style="margin:0 0 10px 0;color:#111;font-size:15px;">New enquiry received</p>
                <p style="margin:0 0 16px 0;color:#555;font-size:13px;">Someone reached out through the website. Here are the details in one place.</p>
              </td>
            </tr>

            <tr>
              <td style="padding:6px 0 0 0;">
                <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="font-size:13px;color:#333;border-top:1px solid #f0f2f5;padding-top:12px;">
                  <tr>
                    <td style="padding:8px 0;border-bottom:1px dashed #f0f2f5;vertical-align:top;width:120px;color:#6b7280;font-weight:600;">Name</td>
                    <td style="padding:8px 0;border-bottom:1px dashed #f0f2f5;vertical-align:top;color:#111;"><?= name ?></td>
                  </tr>

                  <tr>
                    <td style="padding:8px 0;border-bottom:1px dashed #f0f2f5;vertical-align:top;width:120px;color:#6b7280;font-weight:600;">Email address</td>
                    <td style="padding:8px 0;border-bottom:1px dashed #f0f2f5;vertical-align:top;color:#0a66c2;"><a href="mailto:<?= email ?>" style="color:#0a66c2;text-decoration:none;"><?= email ?></a></td>
                  </tr>

                  <tr>
                    <td style="padding:8px 0;border-bottom:1px dashed #f0f2f5;vertical-align:top;width:120px;color:#6b7280;font-weight:600;">Phone number</td>
                    <td style="padding:8px 0;border-bottom:1px dashed #f0f2f5;vertical-align:top;color:#111;"><?= phone ?></td>
                  </tr>

                  <tr>
                    <td style="padding:8px 0;border-bottom:1px dashed #f0f2f5;vertical-align:top;width:120px;color:#6b7280;font-weight:600;">Enquiry type</td>
                    <td style="padding:8px 0;border-bottom:1px dashed #f0f2f5;vertical-align:top;color:#111;"><?= interest ?></td>
                  </tr>

                  <tr>
                    <td style="padding:8px 0;border-bottom:1px dashed #f0f2f5;vertical-align:top;width:120px;color:#6b7280;font-weight:600;">Source</td>
                    <td style="padding:8px 0;border-bottom:1px dashed #f0f2f5;vertical-align:top;color:#111;"><?= source ?></td>
                  </tr>

                  <tr>
                    <td style="padding:12px 0 0 0;vertical-align:top;width:120px;color:#6b7280;font-weight:600;">Message</td>
                    <td style="padding:12px 0 0 0;vertical-align:top;color:#111;line-height:1.4;"><?= message ?></td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td style="padding-top:18px;color:#9ca3af;font-size:12px;">This message was sent from the website contact form.</td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
